<html lang="zh-CN"><head>

<title>问答 · Atlas</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<style>/* LibTV Design System — Colors + Type
 * Source of truth: liblibai-monorepo/apps/liblibtv/src/styles/tokens/*
 * LibTV is dark-first (--color-neutral-950 background).
 */

/* ============ FONTS ============
 * PingFang SC is the primary CJK system font (not webfont — use system stack).
 * Inter = latin text + CJK fallback.
 * Barlow Condensed = hero / display (latin).
 * Poppins = latin subtitles.
 * Outfit = accents.
 */
/* Fonts loaded via <link> in the HTML head (non-blocking) instead of @import. */

:root {
  /* ============ BASE COLORS ============ */
  /* Brand cyan (primary) — updated per user reference */
  --brand-50:  #E6FBFF;
  --brand-100: #B8F0FF;
  --brand-200: #5DDCFF;
  --brand-300: #14C3F0;
  --brand-400: #07B8DD;  /* primary */
  --brand-500: #0E93B3;
  --brand-600: #107490;
  --brand-700: #0C5A72;
  --brand-800: #083F52;
  --brand-900: #042834;

  /* Neutrals — dark-first palette */
  --n-0:   #FFFFFF;
  --n-50:  #F7F7F7;
  --n-100: #F2F3F5;
  --n-200: #E5E6EC;
  --n-300: #E3E3E3;
  --n-400: #C4C4C4;
  --n-500: #919191;
  --n-600: #A8A8A8;
  --n-700: #525252;
  --n-800: #363636;
  --n-900: #171717;
  --n-950: #141414;   /* canvas + page */

  /* Accent colors from Figma */
  --accent-cyan:    #5DDCFF;
  --accent-cyan-2:  #07B8DD;
  --accent-cyan-3:  #09CAF5;
  --accent-purple:  #9747FF;
  --accent-magenta: #FF34D6;
  --accent-pink:    #FE7272;
  --accent-lime:    #DCFE72;

  /* Status */
  --red-400:   #F76560;
  --red-500:   #F53F3F;
  --red-danger:#FF6A6F;
  --yellow-500:#FF7D00;
  --yellow-400:#FF9A2D;
  --green-500: #64D959;
  --green-600: #4EC740;

  /* Alphas */
  --w-05: rgba(255,255,255,.05);
  --w-10: rgba(255,255,255,.10);
  --w-25: rgba(255,255,255,.25);
  --w-40: rgba(255,255,255,.40);
  --w-60: rgba(255,255,255,.60);
  --w-80: rgba(255,255,255,.80);
  --k-05: rgba(0,0,0,.05);
  --k-10: rgba(0,0,0,.10);
  --k-25: rgba(0,0,0,.25);
  --k-50: rgba(0,0,0,.50);
  --k-70: rgba(0,0,0,.70);

  /* ============ SEMANTIC (dark — default) ============ */
  --bg-page: var(--n-950);
  --bg-canvas: var(--n-900);
  --bg-surface: var(--n-900);
  --bg-surface-secondary: var(--n-800);
  --bg-surface-elevated: var(--n-800);
  --bg-overlay: var(--k-70);

  --fg1: #FFFFFF;            /* default text */
  --fg2: var(--n-600);       /* muted / secondary */
  --fg3: var(--n-500);       /* subtle */
  --fg-disabled: var(--n-700);
  --fg-brand: var(--brand-200);
  --fg-on-emphasis: #FFFFFF;

  --border-default: var(--n-700);
  --border-muted: var(--n-800);
  --border-strong: #FFFFFF;
  --border-brand: var(--brand-400);

  --card-bg: var(--n-900);
  --card-border: var(--n-700);
  --popover-bg: var(--n-800);
  --popover-border: var(--n-700);

  --input-bg: var(--n-900);
  --input-border: var(--n-700);
  --input-border-focus: var(--brand-400);
  /* Primary action color — use for buttons / links */
  --brand: var(--brand-400);
  --brand-hover: var(--brand-300);
  --brand-press: var(--brand-500);
  --input-placeholder: var(--n-600);

  --selected-bg: var(--brand-900);
  --selected-border: var(--brand-400);
  --focus-ring: var(--brand-400);

  /* Canvas (ReactFlow) — always dark */
  --canvas-bg: #141414;
  --canvas-bg-dot: #2a2a2a;
  --canvas-node-bg: #191E26;
  --canvas-node-border: #363636;

  /* ============ SPACING / SIZING ============ */
  --s-0: 0px;
  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-5: 20px;
  --s-6: 24px;
  --s-8: 32px;
  --s-10: 40px;
  --s-12: 48px;
  --s-16: 64px;

  --h-xs: 24px;
  --h-sm: 28px;
  --h-md: 32px;
  --h-lg: 40px;
  --h-xl: 48px;

  --r-none: 0;
  --r-sm: 4px;
  --r-md: 6px;
  --r-lg: 8px;
  --r-xl: 12px;
  --r-2xl: 16px;
  --r-full: 9999px;

  --bw-0: 0;
  --bw-hair: 0.5px;
  --bw-1: 1px;
  --bw-2: 2px;

  /* Shadows */
  --shadow-sm: 0 1px 2px 0 rgba(0,0,0,.25);
  --shadow-md: 0 4px 6px -1px rgba(0,0,0,.3);
  --shadow-lg: 0 10px 15px -3px rgba(0,0,0,.35);
  --shadow-xl: 0 20px 25px -5px rgba(0,0,0,.4);
  --shadow-hover: 0 8px 30px rgba(0,0,0,.45);
  --shadow-panel: 0 8px 24px rgba(0,0,0,.5);

  /* Layout */
  --header-h: 80px;
  --activity-banner-h: 50px;

  /* Motion */
  --dur-fast: 150ms;
  --dur-normal: 300ms;
  --dur-slow: 500ms;
  --ease-default: cubic-bezier(.4,0,.2,1);
  --ease-in: cubic-bezier(.4,0,1,1);
  --ease-out: cubic-bezier(0,0,.2,1);
  --ease-bounce: cubic-bezier(.175,.885,.32,1.275);

  /* ============ TYPE ============ */
  /* Type system: PingFang SC (CJK) + Poppins (Latin UI) + Barlow Condensed (hero/display) */
  --ff-cjk: "PingFang SC", "Noto Sans SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
  --ff-sans: "Poppins", var(--ff-cjk), ui-sans-serif, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
  --ff-hero: "Barlow Condensed", "Helvetica Neue Condensed", var(--ff-sans);
  --ff-subtitle: "Poppins", var(--ff-sans);
  --ff-mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;

  /* Sizes (px) — figma shows heavy 11–14px range, occasional 60px display */
  --fs-10: 10px;
  --fs-11: 11px;
  --fs-12: 12px;
  --fs-13: 13px;
  --fs-14: 14px;
  --fs-15: 15px;
  --fs-16: 16px;
  --fs-18: 18px;
  --fs-20: 20px;
  --fs-24: 24px;
  --fs-28: 28px;
  --fs-32: 32px;
  --fs-48: 48px;
  --fs-60: 60px;

  --fw-regular: 400;
  --fw-medium: 500;
  --fw-semibold: 600;
  --fw-bold: 700;

  --lh-tight: 1.1;
  --lh-snug: 1.25;
  --lh-normal: 1.4;
  --lh-relaxed: 1.6;

  --ls-tight: -0.02em;
  --ls-normal: 0;
  --ls-wide: 0.04em;
}

/* ============ LIGHT MODE (secondary) ============ */
.light {
  --bg-page: var(--n-0);
  --bg-canvas: var(--n-100);
  --bg-surface: var(--n-0);
  --bg-surface-secondary: var(--n-50);
  --bg-surface-elevated: var(--n-0);
  --bg-overlay: var(--k-50);

  --fg1: var(--n-950);
  --fg2: var(--n-700);
  --fg3: var(--n-500);
  --fg-disabled: var(--n-400);
  --fg-brand: var(--brand-400);

  --border-default: var(--n-200);
  --border-muted: var(--n-100);
  --border-strong: var(--n-900);

  --card-bg: var(--n-0);
  --card-border: var(--n-200);
  --popover-bg: var(--n-0);
  --popover-border: var(--n-200);

  --input-bg: var(--n-0);
  --input-border: var(--n-200);
  --input-placeholder: var(--n-500);

  --selected-bg: var(--brand-50);
}

/* ============ SEMANTIC TEXT STYLES ============ */
.hero {
  font-family: var(--ff-hero);
  font-weight: 700;
  font-size: var(--fs-60);
  line-height: var(--lh-tight);
  letter-spacing: var(--ls-tight);
  color: var(--fg1);
}
.h1 {
  font-family: var(--ff-sans);
  font-weight: var(--fw-semibold);
  font-size: var(--fs-28);
  line-height: var(--lh-snug);
  color: var(--fg1);
}
.h2 {
  font-family: var(--ff-sans);
  font-weight: var(--fw-semibold);
  font-size: var(--fs-20);
  line-height: var(--lh-snug);
  color: var(--fg1);
}
.h3 {
  font-family: var(--ff-sans);
  font-weight: var(--fw-medium);
  font-size: var(--fs-18);
  line-height: var(--lh-snug);
  color: var(--fg1);
}
.title-section {
  font-family: var(--ff-sans);
  font-weight: var(--fw-medium);
  font-size: var(--fs-16);
  line-height: var(--lh-snug);
  color: var(--fg1);
}
.body {
  font-family: var(--ff-sans);
  font-weight: var(--fw-regular);
  font-size: var(--fs-14);
  line-height: var(--lh-normal);
  color: var(--fg1);
}
.body-sm {
  font-family: var(--ff-sans);
  font-size: var(--fs-13);
  line-height: var(--lh-normal);
  color: var(--fg1);
}
.caption {
  font-family: var(--ff-sans);
  font-size: var(--fs-12);
  line-height: var(--lh-normal);
  color: var(--fg2);
}
.micro {
  font-family: var(--ff-sans);
  font-size: var(--fs-11);
  line-height: var(--lh-normal);
  color: var(--fg2);
  letter-spacing: var(--ls-wide);
}
.code {
  font-family: var(--ff-mono);
  font-size: var(--fs-13);
}
.label {
  font-family: var(--ff-sans);
  font-size: var(--fs-13);
  font-weight: var(--fw-medium);
  color: var(--fg2);
}
</style>
<style>
  :root {
    /* light + blue palette */
    --accent:      #478EFF;
    --accent-deep: #2D6FE0;
    --accent-soft: #EAF2FF;
    --accent-200:  #9FC3FF;
    --ink:    #11203A;
    --ink-2:  #5B6A82;
    --ink-3:  #9AA6BB;
    --surface:   #FFFFFF;
    --surface-2: #F5F8FD;
    --line:    #E6ECF4;
    --line-2:  #EFF3F9;
    --page:    #E8EEF6;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: var(--ff-cjk); -webkit-font-smoothing: antialiased; color: var(--ink); }
  body {
    display: flex; align-items: center; justify-content: center;
    padding: 28px;
    background:
      radial-gradient(900px 620px at 22% 16%, rgba(71,142,255,.16), transparent 60%),
      radial-gradient(720px 520px at 90% 92%, rgba(71,142,255,.10), transparent 56%),
      var(--page);
  }

  /* ============ APP SHELL ============ */
  .app {
    width: 100%; max-width: 1240px;
    height: min(760px, calc(100vh - 56px));
    display: grid; grid-template-columns: 1.05fr 1fr;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-2xl);
    overflow: hidden;
    box-shadow: 0 24px 60px -20px rgba(31,71,140,.28), 0 2px 8px rgba(31,71,140,.06);
  }

  /* ============ LEFT — CAT STAGE ============ */
  .stage {
    position: relative; display: flex; flex-direction: column;
    min-height: 0;
    background:
      radial-gradient(130% 90% at 50% 4%, rgba(71,142,255,.18), transparent 58%),
      linear-gradient(180deg, #F3F8FF 0%, #E4ECFA 100%);
    border-right: 1px solid var(--line);
    overflow: hidden;
  }
  .stage::after {
    content: ""; position: absolute; left: 50%; bottom: 122px;
    width: 320px; height: 80px; transform: translateX(-50%);
    background: radial-gradient(ellipse at center, rgba(71,142,255,.28), transparent 70%);
    filter: blur(10px); pointer-events: none;
  }
  .stage-top {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 22px; z-index: 2;
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand .mark {
    width: 32px; height: 32px; border-radius: 10px; display: grid; place-items: center;
    background: linear-gradient(135deg, #5DA0FF, var(--accent-deep));
    color: #fff; box-shadow: 0 6px 16px rgba(71,142,255,.4);
  }
  .brand .mark svg { width: 19px; height: 19px; display: block; }
  .brand .name { font-size: var(--fs-15); font-weight: var(--fw-semibold); color: var(--ink); }
  .brand .sub { font-size: var(--fs-11); color: var(--ink-3); font-family: var(--ff-subtitle); letter-spacing: .08em; }

  .status-pill {
    display: inline-flex; align-items: center; gap: 7px; height: 28px; padding: 0 12px;
    border-radius: var(--r-full); background: #fff; border: 1px solid var(--line);
    font-size: var(--fs-12); color: var(--ink-2); box-shadow: 0 2px 6px rgba(31,71,140,.06);
  }
  .status-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green-600); box-shadow: 0 0 0 3px rgba(78,199,64,.18); }

  .swatches { position: absolute; top: 66px; left: 22px; z-index: 4; display: flex; flex-direction: column; gap: 9px; }
  .swatch {
    width: 24px; height: 24px; border-radius: var(--r-full); border: 2px solid #fff; cursor: pointer; padding: 0;
    box-shadow: 0 2px 6px rgba(31,71,140,.18);
    transition: transform var(--dur-fast) var(--ease-bounce), box-shadow var(--dur-fast);
  }
  .swatch:hover { transform: scale(1.12); }
  .swatch[aria-pressed="true"] { box-shadow: 0 0 0 3px var(--accent); transform: scale(1.12); }

  .cat-wrap { flex: 1; display: flex; align-items: flex-end; justify-content: center; position: relative; z-index: 1; min-height: 0; }
  .cat-svg { width: min(94%, 430px); height: auto; overflow: visible; transform-box: fill-box; transform-origin: 50% 100%; animation: breathe 4.4s var(--ease-default) infinite; }
  @keyframes breathe { 0%,100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-3px) scale(1.012); } }

  .stage-name { position: relative; text-align: center; z-index: 3; padding-top: 4px; pointer-events: none; }
  .stage-name .nm { font-size: var(--fs-20); font-weight: var(--fw-semibold); color: var(--ink); }
  .stage-name .st { margin-top: 3px; font-size: var(--fs-13); color: var(--accent-deep); min-height: 18px; }

  /* reserved external-link buttons (video / blog) */
  .profile-links { position: relative; z-index: 3; display: flex; gap: 10px; justify-content: center; padding: 12px 20px 0; }
  .link-btn {
    display: inline-flex; align-items: center; gap: 7px; height: 38px; padding: 0 18px;
    border-radius: var(--r-full); font-family: var(--ff-cjk); font-size: var(--fs-13); font-weight: var(--fw-medium);
    cursor: pointer; text-decoration: none; border: 1px solid transparent;
    transition: all var(--dur-fast) var(--ease-default);
  }
  .link-btn svg { width: 16px; height: 16px; }
  .link-btn.primary { background: var(--accent); color: #fff; box-shadow: 0 6px 16px rgba(71,142,255,.32); }
  .link-btn.primary:hover { background: var(--accent-deep); transform: translateY(-1px); }
  .link-btn.ghost { background: #fff; color: var(--accent-deep); border-color: var(--accent-200); box-shadow: 0 2px 6px rgba(31,71,140,.08); }
  .link-btn.ghost:hover { background: var(--accent-soft); transform: translateY(-1px); }

  /* tiny toast for reserved (not-yet-configured) links */
  .toast {
    position: absolute; left: 50%; bottom: 18px; transform: translate(-50%, 12px);
    background: rgba(17,32,58,.92); color: #fff; font-size: var(--fs-12); padding: 8px 14px; border-radius: var(--r-full);
    opacity: 0; pointer-events: none; transition: all var(--dur-normal) var(--ease-default); z-index: 20; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }

  .controls {
    position: relative; z-index: 3; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
    padding: 16px 20px 20px;
  }
  .chip {
    appearance: none; border: 1px solid var(--line); background: #fff; color: var(--ink-2);
    font-family: var(--ff-cjk); font-size: var(--fs-13); height: 32px; padding: 0 14px;
    border-radius: var(--r-full); cursor: pointer; display: inline-flex; align-items: center; gap: 6px;
    box-shadow: 0 1px 3px rgba(31,71,140,.06);
    transition: all var(--dur-fast) var(--ease-default);
  }
  .chip:hover { border-color: var(--accent-200); color: var(--ink); transform: translateY(-1px); }
  .chip[aria-pressed="true"] { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(71,142,255,.35); }

  /* ============ RIGHT — CHAT ============ */
  .chat { display: flex; flex-direction: column; background: var(--surface-2); min-width: 0; min-height: 0; }
  .chat-head { display: flex; align-items: center; gap: 12px; padding: 16px 18px; border-bottom: 1px solid var(--line); background: #fff; flex: none; }
  .chat-head .avatar { width: 40px; height: 40px; border-radius: 50%; overflow: hidden; flex: none; background: #DCE7F6; display: grid; place-items: center; box-shadow: 0 2px 6px rgba(31,71,140,.12); }
  .chat-head .avatar svg { width: 40px; height: 40px; }
  .chat-head .meta { line-height: 1.3; }
  .chat-head .meta .t { font-size: var(--fs-15); font-weight: var(--fw-semibold); color: var(--ink); }
  .chat-head .meta .d { font-size: var(--fs-12); color: var(--ink-3); }
  .chat-head .tools { margin-left: auto; display: flex; gap: 6px; }
  .tool-btn {
    height: 32px; padding: 0 10px; border-radius: var(--r-md); border: 1px solid var(--line); background: #fff; color: var(--ink-2);
    display: inline-flex; align-items: center; gap: 6px; cursor: pointer; font-family: var(--ff-cjk); font-size: var(--fs-12);
    transition: all var(--dur-fast) var(--ease-default);
  }
  .tool-btn:hover { border-color: var(--accent-200); color: var(--ink); background: var(--accent-soft); }
  .tool-btn svg { width: 15px; height: 15px; }
  .tool-btn.icon-only { width: 32px; padding: 0; justify-content: center; }
  .tool-btn.on { background: var(--accent); border-color: var(--accent); color: #fff; }
  .tool-btn.on:hover { background: var(--accent-deep); color: #fff; }

  .messages { flex: 1 1 0; min-height: 0; overflow-y: auto; padding: 22px 22px 8px; display: flex; flex-direction: column; gap: 14px; scroll-behavior: smooth; scrollbar-width: thin; scrollbar-color: #C8D4E4 transparent; }
  .messages::-webkit-scrollbar { width: 8px; }
  .messages::-webkit-scrollbar-thumb { background: #D4DEEC; border-radius: 8px; }

  .msg { display: flex; gap: 10px; max-width: 84%; animation: pop .32s var(--ease-bounce); }
  @keyframes pop { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .msg .bubble { padding: 10px 14px; border-radius: 14px; font-size: var(--fs-14); line-height: var(--lh-normal); word-break: break-word; }
  .msg.bot { align-self: flex-start; }
  .msg.bot .av { width: 32px; height: 32px; border-radius: 50%; flex: none; overflow: hidden; background: #DCE7F6; }
  .msg.bot .av svg { width: 32px; height: 32px; }
  .msg.bot .bubble { background: #fff; border: 1px solid var(--line); border-top-left-radius: 4px; color: var(--ink); box-shadow: 0 1px 3px rgba(31,71,140,.05); }
  .msg.me { align-self: flex-end; flex-direction: row-reverse; }
  .msg.me .bubble { background: var(--accent); color: #fff; font-weight: var(--fw-medium); border-top-right-radius: 4px; box-shadow: 0 4px 12px rgba(71,142,255,.28); }

  .typing { display: inline-flex; gap: 4px; align-items: center; padding: 4px 2px; }
  .typing i { width: 7px; height: 7px; border-radius: 50%; background: var(--ink-3); animation: typing 1.2s infinite ease-in-out; }
  .typing i:nth-child(2) { animation-delay: .15s; }
  .typing i:nth-child(3) { animation-delay: .3s; }
  @keyframes typing { 0%,60%,100% { transform: translateY(0); opacity: .4; } 30% { transform: translateY(-5px); opacity: 1; } }

  .composer { padding: 12px 18px 18px; border-top: 1px solid var(--line); background: #fff; flex: none; }
  .quick-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 9px; }
  .quick-head .lbl { font-size: var(--fs-11); color: var(--ink-3); letter-spacing: .04em; }
  .quick-dots { display: flex; gap: 5px; align-items: center; }
  .quick-dots i { width: 6px; height: 6px; border-radius: 50%; background: #D2DCEA; transition: all var(--dur-fast); cursor: pointer; }
  .quick-dots i.active { background: var(--accent); width: 16px; border-radius: 3px; }
  .quick { position: relative; min-height: 30px; margin-bottom: 12px; }

    border: 1px solid var(--line); background: var(--surface-2); color: var(--ink-2);

  }
  .quick-page button:hover { border-color: var(--accent); color: var(--accent-deep); background: var(--accent-soft); }

  .send:hover { background: var(--accent-deep); }

  /* ============================================================= */
  /* ============ THE CAT — semi-realistic SVG ================== */
  /* ============================================================= */
  .cat .v { display: none; }

  /* blink via eyelids dropping */
  .cat .lids { transform-box: fill-box; transform-origin: 50% 0%; transform: scaleY(0); animation: blink 5.4s infinite; }
  @keyframes blink { 0%,92%,100% { transform: scaleY(0); } 95.5% { transform: scaleY(1); } }
  .cat[data-state="talking"] .lids { animation: blink 4.2s infinite; }
  .cat .pupils { transform-box: fill-box; transform-origin: center; animation: lookaround 8s ease-in-out infinite; }
  @keyframes lookaround { 0%,38%,100% { transform: translate(0,0);} 52%,68% { transform: translate(4px,1px);} 84% { transform: translate(-3px,-1px);} }

  /* talking */
  .cat .mouth-talk-open { transform-box: fill-box; transform-origin: 50% 0%; }
  .cat[data-state="talking"] .mouth-talk-open { animation: chatter .32s steps(1) infinite; }
  @keyframes chatter { 0% { transform: scaleY(.3);} 50% { transform: scaleY(1);} 100% { transform: scaleY(.55);} }
  .cat[data-state="talking"] .head-grp { animation: bob 1.1s ease-in-out infinite; }
  @keyframes bob { 0%,100% { transform: rotate(0) translateY(0);} 50% { transform: rotate(-1.3deg) translateY(-2px);} }

  /* thinking */
  .cat[data-state="thinking"] .head-grp { animation: tilt-think 3s ease-in-out infinite; }
  @keyframes tilt-think { 0%,100% { transform: rotate(0);} 50% { transform: rotate(-5deg);} }
  .cat[data-state="thinking"] .think-bubble { display: block; }
  .cat .think-bubble .td { transform-box: fill-box; transform-origin: center; animation: thinkdot 1.4s ease-in-out infinite; }
  .cat .think-bubble .td:nth-child(2) { animation-delay: .2s; }
  .cat .think-bubble .td:nth-child(3) { animation-delay: .4s; }
  @keyframes thinkdot { 0%,100% { transform: scale(.6); opacity:.4;} 50% { transform: scale(1); opacity:1;} }

  /* happy */
  .cat[data-state="happy"] .head-grp { animation: happy-bounce 1s var(--ease-bounce) infinite; }
  @keyframes happy-bounce { 0%,100% { transform: translateY(0) rotate(0);} 30% { transform: translateY(-6px) rotate(1.5deg);} 60% { transform: translateY(-2px) rotate(-1.5deg);} }
  .cat[data-state="happy"] .sparkles { display: block; }
  .cat .sparkles .sp { transform-box: fill-box; transform-origin: center; animation: sparkle 1.3s ease-in-out infinite; }
  .cat .sparkles .sp:nth-child(2) { animation-delay:.35s; }
  .cat .sparkles .sp:nth-child(3) { animation-delay:.65s; }
  .cat .sparkles .sp:nth-child(4) { animation-delay:.9s; }
  @keyframes sparkle { 0%,100% { transform: scale(0) rotate(0); opacity:0;} 50% { transform: scale(1) rotate(45deg); opacity:1;} }

  /* confused */
  .cat[data-state="confused"] .head-grp { animation: tilt-confused 2.6s ease-in-out infinite; }
  @keyframes tilt-confused { 0%,100% { transform: rotate(7deg);} 50% { transform: rotate(9deg);} }
  .cat[data-state="confused"] .ear-left-grp { animation: ear-droop 2.6s ease-in-out infinite; transform-box: fill-box; transform-origin: 70% 95%; }
  @keyframes ear-droop { 0%,100% { transform: rotate(0);} 50% { transform: rotate(13deg);} }
  .cat[data-state="confused"] .question { display: block; }
  .cat .question .qm { transform-box: fill-box; transform-origin: center bottom; animation: qbob 1.8s ease-in-out infinite; }
  @keyframes qbob { 0%,100% { transform: translateY(0) rotate(-6deg); opacity:.85;} 50% { transform: translateY(-6px) rotate(6deg); opacity:1;} }

  /* sleeping */
  .cat-svg.sleeping { animation: sleep-breathe 4.8s ease-in-out infinite; }
  @keyframes sleep-breathe { 0%,100% { transform: translateY(0) scale(1);} 50% { transform: translateY(2px) scale(1.02);} }
  .cat[data-state="sleep"] .head-grp { transform: rotate(7deg) translate(5px,5px); transform-box: fill-box; transform-origin: 50% 92%; }
  .cat[data-state="sleep"] .zzz { display: block; }
  .cat .zzz .z { transform-box: fill-box; transform-origin: center; animation: zfloat 3s ease-in-out infinite; opacity: 0; }
  .cat .zzz .z:nth-child(2) { animation-delay: 1s; }
  .cat .zzz .z:nth-child(3) { animation-delay: 2s; }
  @keyframes zfloat { 0% { transform: translate(0,0) scale(.6); opacity:0;} 25% { opacity:1;} 100% { transform: translate(16px,-44px) scale(1.1); opacity:0;} }

  /* variant visibility */
  .cat[data-state="idle"]     .eyes-open,
  .cat[data-state="talking"]  .eyes-open,
  .cat[data-state="thinking"] .eyes-open,
  .cat[data-state="happy"]    .eyes-happy,
  .cat[data-state="confused"] .eyes-confused,
  .cat[data-state="sleep"]    .eyes-closed { display: block; }

  .cat[data-state="idle"]     .mouth-neutral,
  .cat[data-state="thinking"] .mouth-neutral,
  .cat[data-state="talking"]  .mouth-talk,
  .cat[data-state="happy"]    .mouth-smile,
  .cat[data-state="confused"] .mouth-neutral,
  .cat[data-state="sleep"]    .mouth-sleep { display: block; }

  .cat .blush { opacity: 0; transition: opacity .3s; }
  .cat[data-state="happy"] .blush { opacity: .8; }

  @media (max-width: 920px) {
    .app { grid-template-columns: 1fr; height: auto; max-width: 460px; }

    .chat { height: 470px; }
  }
  @media (prefers-reduced-motion: reduce) { .cat-svg, .cat *, .msg, .quick-page { animation: none !important; } }
</style>

                <path d="M226 226 C 264 228 296 234 318 246"></path>
                <path d="M226 234 C 260 242 286 252 304 266"></path>
              </g>

              <!-- ===== MOUTH ===== -->
              <!-- neutral cat mouth -->
              <g class="v mouth-neutral" fill="none" stroke="#5B4A52" stroke-width="2.8" stroke-linecap="round">
                <path d="M180 224 L180 230"></path>
                <path d="M180 230 C 174 240 162 240 156 234"></path>
                <path d="M180 230 C 186 240 198 240 204 234"></path>
              </g>
              <!-- talking open mouth -->
              <g class="v mouth-talk">
                <path d="M180 224 L180 230" stroke="#5B4A52" stroke-width="2.6" stroke-linecap="round"></path>
                <g class="mouth-talk-open">
                  <path d="M158 232 C 168 230 192 230 202 232 C 198 252 162 252 158 232 Z" fill="#7A3346"></path>
                  <ellipse cx="180" cy="244" rx="13" ry="6" fill="#F08AA0"></ellipse>
                </g>
              </g>
              <!-- smile (happy) -->
              <g class="v mouth-smile">
                <path d="M180 224 L180 229" stroke="#5B4A52" stroke-width="2.6" stroke-linecap="round"></path>
                <path d="M158 230 C 168 252 192 252 202 230 C 192 240 168 240 158 230 Z" fill="#7A3346"></path>
                <path d="M164 234 C 172 244 188 244 196 234" fill="#F08AA0"></path>
              </g>
              <!-- sleep small mouth -->
              <g class="v mouth-sleep" fill="none" stroke="#5B4A52" stroke-width="2.6" stroke-linecap="round">
                <path d="M180 224 L180 229"></path>
                <path d="M180 229 C 175 236 167 236 163 232"></path>
                <path d="M180 229 C 185 236 193 236 197 232"></path>
              </g>
            </g><!-- /head-grp -->

            <!-- ===== DECORATIONS ===== -->
            <g class="v think-bubble">
              <ellipse cx="300" cy="86" rx="34" ry="24" fill="#fff" stroke="var(--line)" stroke-width="1.5"></ellipse>
              <circle cx="266" cy="116" r="7" fill="#fff" stroke="var(--line)" stroke-width="1.2"></circle>
              <circle cx="252" cy="132" r="4" fill="#fff" stroke="var(--line)" stroke-width="1"></circle>
              <circle class="td" cx="286" cy="86" r="5" fill="var(--accent)"></circle>
              <circle class="td" cx="300" cy="86" r="5" fill="var(--accent)"></circle>
              <circle class="td" cx="314" cy="86" r="5" fill="var(--accent)"></circle>
            </g>
            <g class="v sparkles">
              <path class="sp" d="M58 96 l4 10 10 4 -10 4 -4 10 -4 -10 -10 -4 10 -4 z" fill="var(--accent)"></path>
              <path class="sp" d="M302 66 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z" fill="#FFC247"></path>
              <path class="sp" d="M50 206 l2.5 7 7 2.5 -7 2.5 -2.5 7 -2.5 -7 -7 -2.5 7 -2.5 z" fill="#FFC247"></path>
              <path class="sp" d="M312 168 l3 8 8 3 -8 3 -3 8 -3 -8 -8 -3 8 -3 z" fill="var(--accent)"></path>
            </g>
            <g class="v question" fill="var(--accent)" font-family="var(--ff-hero)" font-weight="700">
              <text class="qm" x="286" y="68" font-size="46">?</text>
              <text class="qm" x="322" y="104" font-size="28" opacity=".75">?</text>
            </g>
            <g class="v zzz" fill="var(--accent)" font-family="var(--ff-hero)" font-weight="700">
              <text class="z" x="266" y="92" font-size="24">z</text>
              <text class="z" x="282" y="76" font-size="32">Z</text>
              <text class="z" x="302" y="58" font-size="40">Z</text>
            </g>
          </svg>
        </div>
      </div>

      <div class="stage-name">
        <div class="nm">智慧之咪</div>
        <div class="st" id="stateLabel">在听你说话喵～</div>
      </div>

      <!-- reserved links: set data-href to a real URL later; href stays "#" until then -->
      <div class="profile-links">
        <a class="link-btn primary" id="videoLink" href="#" data-href="" data-name="视频" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="14" height="16" rx="2"></rect><path d="M16 9l6-3v12l-6-3"></path></svg>
          查看视频
        </a>
        <a class="link-btn ghost" id="blogLink" href="#" data-href="" data-name="博客" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h11l5 5v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1z"></path><path d="M14 4v5h5"></path><path d="M8 13h8M8 17h5"></path></svg>
          查看博客
        </a>
      </div>

      <div class="controls" id="controls" role="group" aria-label="状态预览">
        <button class="chip" data-state="idle" aria-pressed="true">待机</button>
        <button class="chip" data-state="talking" aria-pressed="false">说话</button>
        <button class="chip" data-state="thinking" aria-pressed="false">思考</button>
        <button class="chip" data-state="happy" aria-pressed="false">开心</button>
        <button class="chip" data-state="confused" aria-pressed="false">疑惑</button>
        <button class="chip" data-state="sleep" aria-pressed="false">睡觉</button>
      </div>
      <div class="toast" id="toast"></div>
    </section>

    <!-- ===================== RIGHT: CHAT ===================== -->
    <section class="chat">
      <div class="chat-head">
        <div class="avatar" id="headAvatar"></div>
        <div class="meta">
          <div class="t">智慧之咪</div>
          <div class="d" id="headStatus">在线 · 通常几秒内回复</div>
        </div>
        <div class="tools">
          <button class="tool-btn" id="clearBtn" title="清除对话">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"></path><path d="M8 6V4h8v2"></path><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v6M14 11v6"></path></svg>
            清除对话
          </button>
        </div>
      </div>

      <div class="messages" id="messages"></div>

      <div class="composer">
        <div class="quick-head">
          <span class="lbl">猜你想问</span>
          <div class="quick-dots" id="quickDots"></div>
        </div>
        <div class="quick" id="quick"></div>
        <div class="input-row">
          <textarea id="input" rows="1" placeholder="和智慧之咪说点什么…"></textarea>
          <button class="send" id="send" title="发送"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"></path></svg></button>
        </div>
      </div>
    </section>
  </div>

<script>
(function () {
  const cat = document.getElementById('cat');
  const catSvg = document.getElementById('catSvg');
  const stateLabel = document.getElementById('stateLabel');
  const headStatus = document.getElementById('headStatus');
  const controls = document.getElementById('controls');
  const messages = document.getElementById('messages');
  const input = document.getElementById('input');
  const send = document.getElementById('send');
  const swatches = document.getElementById('swatches');
  const headAvatar = document.getElementById('headAvatar');

  // ---- fur palettes (drive SVG gradient stops via CSS vars) ----
  const FUR = {
    blue:     { fur:'#7E97B4', hi:'#A8BBD2', lo:'#566B85', bibHi:'#F1F5FA', bib:'#CBD7E6', bibSh:'#A9B8CC', irisHi:'#CFEBFF', iris:'#4C9BE6', irisLo:'#1E5FA8', whisker:'#E9EEF5' },
    silver:   { fur:'#C7D0DC', hi:'#EDF1F6', lo:'#9AA7B8', bibHi:'#FFFFFF', bib:'#E2E8F0', bibSh:'#C0CAD8', irisHi:'#D6F3D9', iris:'#6FC36B', irisLo:'#2F8C42', whisker:'#FFFFFF' },
    orange:   { fur:'#E59B4E', hi:'#F4C281', lo:'#C2772E', bibHi:'#FFF6EC', bib:'#F6E2C8', bibSh:'#E0C49E', irisHi:'#DFF6C9', iris:'#A8C84E', irisLo:'#6E8C24', whisker:'#FFF3E2' },
    charcoal: { fur:'#4C5563', hi:'#697486', lo:'#2E343F', bibHi:'#9AA6B6', bib:'#727E8E', bibSh:'#3F4754', irisHi:'#FFE39A', iris:'#F0B43E', irisLo:'#B07C12', whisker:'#C3CCD8' }
  };
  function applyFur(key) {
    const f = FUR[key];
    cat.style.setProperty('--c-fur', f.fur);
    cat.style.setProperty('--c-fur-hi', f.hi);
    cat.style.setProperty('--c-fur-lo', f.lo);
    cat.style.setProperty('--c-bib-hi', f.bibHi);
    cat.style.setProperty('--c-bib', f.bib);
    cat.style.setProperty('--c-bib-sh', f.bibSh);
    cat.style.setProperty('--c-iris-hi', f.irisHi);
    cat.style.setProperty('--c-iris', f.iris);
    cat.style.setProperty('--c-iris-lo', f.irisLo);
    cat.style.setProperty('--c-whisker', f.whisker);
    renderAvatars();
  }
  swatches.addEventListener('click', e => {
    const b = e.target.closest('.swatch'); if (!b) return;
    swatches.querySelectorAll('.swatch').forEach(s => s.setAttribute('aria-pressed', String(s === b)));
    applyFur(b.dataset.fur);
  });

  function avatarSVG() {
    const f = FUR[swatches.querySelector('[aria-pressed="true"]').dataset.fur];
    return `<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <path d="M14 30 C10 12 16 6 24 12 C30 16 31 26 30 32 Z" fill="${f.fur}"/>
      <path d="M50 30 C54 12 48 6 40 12 C34 16 33 26 34 32 Z" fill="${f.fur}"/>
      <path d="M18 22 C12 8 18 4 24 8 C28 11 28 18 27 23 Z" fill="#EBB4C4"/>
      <path d="M46 22 C52 8 46 4 40 8 C36 11 36 18 37 23 Z" fill="#EBB4C4"/>
      <ellipse cx="32" cy="36" rx="23" ry="21" fill="${f.fur}"/>
      <ellipse cx="32" cy="42" rx="15" ry="12" fill="${f.bibHi}"/>
      <ellipse cx="23" cy="34" rx="6.5" ry="7.5" fill="${f.iris}"/>
      <ellipse cx="41" cy="34" rx="6.5" ry="7.5" fill="${f.iris}"/>
      <ellipse cx="23" cy="34" rx="2.2" ry="6" fill="#10141C"/>
      <ellipse cx="41" cy="34" rx="2.2" ry="6" fill="#10141C"/>
      <circle cx="21.5" cy="31.5" r="1.6" fill="#fff"/><circle cx="39.5" cy="31.5" r="1.6" fill="#fff"/>
      <path d="M29 42 L35 42 L32 46 Z" fill="#D4798F"/>
      <path d="M32 46 q-4 5 -8 3 M32 46 q4 5 8 3" fill="none" stroke="#5B4A52" stroke-width="1.4" stroke-linecap="round"/>
    </svg>`;
  }
  function renderAvatars() {
    const svg = avatarSVG();
    headAvatar.innerHTML = svg;
    document.querySelectorAll('.msg.bot .av').forEach(a => a.innerHTML = svg);
  }

  // ---- state machine (manual preview retained; chat auto-drives it) ----
  const STATE_TEXT = {
    idle:'在听你说话喵～', talking:'正在回答你…', thinking:'让我翻翻你的内容库…',
    happy:'查到啦！(=^･ω･^=)', confused:'你的库里好像没有相关内容喵…', sleep:'呼…呼…睡着了 💤'
  };
  let userLocked = false, lockTimer = null;
  function setState(s) {
    cat.dataset.state = s;
    stateLabel.textContent = STATE_TEXT[s] || '';
    catSvg.classList.toggle('sleeping', s === 'sleep');
    controls.querySelectorAll('.chip').forEach(c => c.setAttribute('aria-pressed', String(c.dataset.state === s)));
    headStatus.textContent = s === 'thinking' ? '正在检索…' : s === 'talking' ? '正在回答…' : s === 'sleep' ? '休息中 · 轻触唤醒' : '在线 · 基于你的内容库回答';
  }
  function autoState(s) { if (!userLocked) setState(s); }
  controls.addEventListener('click', e => {
    const btn = e.target.closest('.chip'); if (!btn) return;
    userLocked = true; clearTimeout(lockTimer);
    setState(btn.dataset.state);
    lockTimer = setTimeout(() => { userLocked = false; }, 9000);
  });
  cat.addEventListener('click', () => {
    if (cat.dataset.state === 'sleep') { userLocked = false; setState('happy'); setTimeout(() => { if (!userLocked) setState('idle'); }, 2000); }
  });

  // ---- chat history (per-browser, same key as the previous /ask) ----
  const STORAGE_KEY = 'aishelf_ask_history';
  const GREETING = '你好呀～我是智慧之咪，Atlas 的问答小助手喵！🐾 问我关于你内容库（视频 / 博客 / 笔记）的问题，我会带着可点击的来源回答你。';
  function loadHistory() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; } }
  function saveHistory() { localStorage.setItem(STORAGE_KEY, JSON.stringify(history)); }
  const history = loadHistory();

  function addMsg(role, text) {
    const el = document.createElement('div');
    el.className = 'msg ' + (role === 'me' ? 'me' : 'bot');
    el.innerHTML = (role === 'bot' ? '<span class="av"></span>' : '') + '<div class="bubble"></div>';
    el.querySelector('.bubble').textContent = text || '';
    if (role === 'bot') el.querySelector('.av').innerHTML = avatarSVG();
    messages.appendChild(el);
    messages.scrollTop = messages.scrollHeight;
    return el;
  }
  function setTyping(bubble) { bubble.innerHTML = '<span class="typing"><i></i><i></i><i></i></span>'; }
  function extrasBox() { const d = document.createElement('div'); d.className = 'extras'; messages.appendChild(d); messages.scrollTop = messages.scrollHeight; return d; }

  // Render a clickable "来源" panel beneath the answer.
  function renderSources(sources) {
    if (!sources || !sources.length) return;
    const box = extrasBox();
    const wrap = document.createElement('div'); wrap.className = 'sources';
    const lbl = document.createElement('div'); lbl.className = 'lbl'; lbl.textContent = '来源'; wrap.appendChild(lbl);
    sources.forEach((s, i) => {
      const a = document.createElement('a');
      a.href = (s.type === 'video' ? '/videos/' : '/blogs/') + encodeURIComponent(s.id);
      a.target = '_blank'; a.rel = 'noopener';
      a.textContent = '[' + (i + 1) + '] ' + s.title + ' — ' + s.author;
      wrap.appendChild(a);
    });
    box.appendChild(wrap);
  }

  // Render content jump-cards (videos / blogs) on explicit open/view intent.
  function renderJump(jump) {
    if (!jump || !jump.length) return;
    const box = extrasBox(); box.classList.add('jump-cards');
    const lbl = document.createElement('div'); lbl.className = 'lbl'; lbl.textContent = '你想打开的内容'; box.appendChild(lbl);
    jump.forEach(s => {
      const card = document.createElement('div'); card.className = 'jump-card';
      const m = document.createElement('span'); m.className = 'm';
      m.textContent = s.title + ' — ' + s.author + ' · ' + s.platform;
      const a = document.createElement('a');
      a.href = (s.type === 'video' ? '/videos/' : '/blogs/') + encodeURIComponent(s.id);
      a.target = '_blank'; a.rel = 'noopener';
      a.textContent = s.type === 'video' ? '打开视频' : '打开文章';
      card.append(m, a); box.appendChild(card);
    });
  }

  // When the library has nothing relevant, guide the user to collect it.
  function renderCollect(payload) {
    const box = extrasBox();
    const wrap = document.createElement('div'); wrap.className = 'collect-guide';
    const text = document.createElement('span');
    text.textContent = '本地内容库暂时没有相关内容，去 Hermes 采集？';
    const a = document.createElement('a');
    a.href = '/collect?q=' + encodeURIComponent((payload && payload.q) || '');
    a.textContent = '去 Hermes 采集';
    wrap.append(text, a); box.appendChild(wrap);
  }

  function resetChat() {
    messages.innerHTML = '';
    history.length = 0;
    localStorage.removeItem(STORAGE_KEY);
    addMsg('bot', GREETING);
    autoState('idle');
  }

  async function ask(text) {
    history.push({ role: 'user', content: text }); saveHistory();
    addMsg('me', text);
    const botEl = addMsg('bot', '');
    const bub = botEl.querySelector('.bubble');
    setTyping(bub);
    autoState('thinking');
    let acc = '', streaming = false;

    function fail(msg) { bub.classList.remove('typing'); bub.classList.add('err'); bub.textContent = msg; autoState('confused'); }

    let resp;
    try {
      resp = await fetch('/ask/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history }),
      });
    } catch (e) { fail('⚠️ 请求失败：' + e); return; }
    if (!resp.ok || !resp.body) { fail('⚠️ 请求失败：HTTP ' + resp.status); return; }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let idx;
      while ((idx = buf.indexOf('\n\n')) >= 0) {
        const raw = buf.slice(0, idx);
        buf = buf.slice(idx + 2);
        if (!raw.startsWith('data: ')) continue;
        let p;
        try { p = JSON.parse(raw.slice(6)); } catch { continue; }
        if (p.sources) {
          renderSources(p.sources);
        } else if (p.jump) {
          renderJump(p.jump);
        } else if (p.collect) {
          renderCollect(p.collect);
          autoState('confused');
        } else if (p.delta) {
          if (!streaming) { streaming = true; bub.innerHTML = ''; autoState('talking'); }
          acc += p.delta; bub.textContent = acc; messages.scrollTop = messages.scrollHeight;
        } else if (p.error) {
          fail('⚠️ ' + p.error);
        } else if (p.done) {
          history.push({ role: 'assistant', content: acc }); saveHistory();
          if (!userLocked) { setState('happy'); setTimeout(() => { if (!userLocked) setState('idle'); }, 2400); }
        }
      }
    }
    if (!streaming) { bub.classList.remove('typing'); }
  }

  function submit() {
    const t = input.value.trim(); if (!t) return;
    input.value = ''; input.style.height = 'auto'; send.disabled = true;
    ask(t).finally(() => { send.disabled = false; input.focus(); });
  }
  send.addEventListener('click', submit);
  input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); } });
  input.addEventListener('input', () => { input.style.height = 'auto'; input.style.height = Math.min(input.scrollHeight, 96) + 'px'; });
  document.getElementById('clearBtn').addEventListener('click', resetChat);

  // ---- quick suggestions (Atlas-relevant), auto-paging like the design ----
  const QUICK_PAGES = [
    ['我收藏的内容里关于 RAG 有哪些观点？', '总结我看过的 agent 相关内容', '构建有效 AI agent 的关键要点', '打开关于 Transformer 的视频'],
    ['大语言模型是怎么做推理的？', '解释一下 Chain-of-Thought', '我的笔记里提到过向量数据库吗？', '上下文工程该怎么做？']
  ];
  const quick = document.getElementById('quick');
  const quickDots = document.getElementById('quickDots');
  let qPage = 0, autoTimer = null;
  QUICK_PAGES.forEach((_, i) => {
    const d = document.createElement('i');
    d.addEventListener('click', () => { showPage(i); restartAuto(); });
    quickDots.appendChild(d);
  });
  function buildPage(idx) {
    const wrap = document.createElement('div'); wrap.className = 'quick-page';
    QUICK_PAGES[idx].forEach(q => {
      const b = document.createElement('button'); b.textContent = q;
      b.addEventListener('click', () => { input.value = q; submit(); });
      wrap.appendChild(b);
    });
    return wrap;
  }
  function showPage(idx) {
    qPage = (idx + QUICK_PAGES.length) % QUICK_PAGES.length;
    const old = quick.querySelector('.quick-page:not(.leaving)');
    const next = buildPage(qPage);
    next.style.opacity = '0'; quick.appendChild(next);
    requestAnimationFrame(() => { next.style.opacity = '1'; });
    if (old) { old.classList.add('leaving'); setTimeout(() => old.remove(), 360); }
    quickDots.querySelectorAll('i').forEach((d, i) => d.classList.toggle('active', i === qPage));
  }
  function restartAuto() { clearInterval(autoTimer); autoTimer = setInterval(() => showPage(qPage + 1), 5200); }

  // ---- left-stage buttons now link to the real browse pages ----
  const videoLink = document.getElementById('videoLink');
  const blogLink = document.getElementById('blogLink');
  videoLink.href = '/videos'; videoLink.dataset.href = '/videos';
  blogLink.href = '/blogs'; blogLink.dataset.href = '/blogs';

  // ---- init ----
  applyFur('blue');
  showPage(0); restartAuto();
  if (history.length) {
    for (const m of history) addMsg(m.role === 'user' ? 'me' : 'bot', m.content);
  } else {
    addMsg('bot', GREETING);
  }
  setState('idle');
})();
</script>
