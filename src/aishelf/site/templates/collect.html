{% extends "base.html" %}
{% block title %}Hermes · Atlas{% endblock %}
{% block content %}
<div class="hermes">
  <header class="hermes-head">
    <div class="hermes-avatar">H</div>
    <div>
      <h1>Hermes</h1>
      <p class="lead">用自然语言让 Hermes 去采集视频 / 博客，完成后到下方查看结果。</p>
    </div>
  </header>

  <div class="tokenbar">
    <label for="collecttoken">采集口令</label>
    <input id="collecttoken" type="password" autocomplete="off" placeholder="输入管理员发放的口令" />
    <span class="token-hint">采集成本较高，仅白名单口令可发起。</span>
  </div>

  <div id="log" class="chatlog"></div>

  <div id="examples" class="examples">
    <span class="examples-label">试试：</span>
    <button type="button" class="chip">爬取 Karpathy 最近的视频</button>
    <button type="button" class="chip">找几篇关于 AI agent 的博客</button>
    <button type="button" class="chip">抓 3Blue1Brown 的一个视频</button>
  </div>

  <form id="chatform" class="composer">
    <textarea id="chatinput" rows="1" placeholder="输入采集需求，Enter 发送，Shift+Enter 换行…"></textarea>
    <button type="submit" id="chatsend" class="send" title="发送" aria-label="发送">➤</button>
  </form>

  <div class="actionbar">
    <button id="chatclear" type="button" class="ghost">清除对话</button>
    <span class="spacer"></span>
    <a class="btn" href="/videos">查看视频</a>
    <a class="btn" href="/blogs">查看博客</a>
  </div>
</div>
<script>
const STORAGE_KEY = "aishelf_collect_history";
const TOKEN_KEY = "aishelf_collect_token";
const log = document.getElementById("log");
const form = document.getElementById("chatform");
const input = document.getElementById("chatinput");
const sendBtn = document.getElementById("chatsend");
const clearBtn = document.getElementById("chatclear");
const examples = document.getElementById("examples");
const tokenInput = document.getElementById("collecttoken");

// Persist the collect passcode locally; it gates every /collect/chat call.
tokenInput.value = localStorage.getItem(TOKEN_KEY) || "";
tokenInput.addEventListener("input", () => {
  localStorage.setItem(TOKEN_KEY, tokenInput.value.trim());
});

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}
function saveHistory() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
}

const messages = loadHistory();

// Returns the bubble element (the text container) for streaming updates.
function bubble(cls, text) {
  const row = document.createElement("div");
  row.className = "msg " + cls;
  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.textContent = cls === "user" ? "我" : "H";
  const body = document.createElement("div");
  body.className = "bubble " + cls;
  body.textContent = text;
  row.append(avatar, body);
  log.appendChild(row);
  log.scrollTop = log.scrollHeight;
  return body;
}

// Three bouncing dots until the first token arrives.
function showTyping(el) {
  el.classList.add("typing");
  el.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
}

function updateExamples() {
  examples.style.display = messages.length ? "none" : "flex";
}

// Auto-grow the composer textarea.
function autosize() {
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 200) + "px";
}
input.addEventListener("input", autosize);

// Restore prior conversation on load so a refresh keeps the history.
for (const m of messages) {
  bubble(m.role === "user" ? "user" : "assistant", m.content);
}
updateExamples();

async function send(text) {
  messages.push({ role: "user", content: text });
  saveHistory();
  updateExamples();
  bubble("user", text);
  const assistantEl = bubble("assistant", "");
  showTyping(assistantEl);
  let acc = "";
  let streaming = false;

  function fail(msg) {
    assistantEl.classList.remove("typing", "streaming");
    assistantEl.classList.add("error");
    assistantEl.textContent = msg;
  }

  let resp;
  try {
    resp = await fetch("/collect/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "X-Collect-Token": (localStorage.getItem(TOKEN_KEY) || "").trim(),
      },
      body: JSON.stringify({ messages }),
    });
  } catch (e) {
    fail("⚠️ 请求失败：" + e);
    return;
  }
  if (resp.status === 403) {
    fail("🔒 采集口令无效，请联系管理员加入白名单。");
    tokenInput.classList.add("invalid");
    tokenInput.focus();
    return;
  }
  if (!resp.ok || !resp.body) {
    fail("⚠️ 请求失败：HTTP " + resp.status);
    return;
  }
  tokenInput.classList.remove("invalid");
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buf = "";
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += decoder.decode(value, { stream: true });
    let idx;
    while ((idx = buf.indexOf("\n\n")) >= 0) {
      const raw = buf.slice(0, idx);
      buf = buf.slice(idx + 2);
      if (!raw.startsWith("data: ")) continue;
      let payload;
      try { payload = JSON.parse(raw.slice(6)); } catch { continue; }
      if (payload.delta) {
        if (!streaming) {
          streaming = true;
          assistantEl.classList.remove("typing");
          assistantEl.classList.add("streaming");
        }
        acc += payload.delta;
        assistantEl.textContent = acc;
        log.scrollTop = log.scrollHeight;
      } else if (payload.error) {
        fail("⚠️ " + payload.error);
      } else if (payload.done) {
        assistantEl.classList.remove("typing", "streaming");
        messages.push({ role: "assistant", content: acc });
        saveHistory();
      }
    }
  }
  assistantEl.classList.remove("typing", "streaming");
}

function submitCurrent() {
  const text = input.value.trim();
  if (!text) return;
  input.value = "";
  autosize();
  sendBtn.disabled = true;
  send(text).finally(() => { sendBtn.disabled = false; input.focus(); });
}

form.addEventListener("submit", (e) => { e.preventDefault(); submitCurrent(); });

// Enter sends; Shift+Enter inserts a newline.
input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    submitCurrent();
  }
});

// Example chips fill the composer.
for (const chip of examples.querySelectorAll(".chip")) {
  chip.addEventListener("click", () => {
    input.value = chip.textContent;
    autosize();
    input.focus();
  });
}

clearBtn.addEventListener("click", () => {
  if (messages.length && !confirm("确定清除全部对话历史？")) return;
  messages.length = 0;
  localStorage.removeItem(STORAGE_KEY);
  log.innerHTML = "";
  updateExamples();
});
</script>
{% endblock %}
