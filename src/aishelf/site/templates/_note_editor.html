<section class="notes">
  <div class="notes-head">
    <h2>我的笔记</h2>
    <button id="note-edit-btn" type="button" class="btn-link"{% if not note %} hidden{% endif %}>编辑</button>
  </div>
  <div id="note-view" class="note-view post-body"{% if not note %} hidden{% endif %}>{{ note_html | safe }}</div>
  <div id="note-edit"{% if note %} hidden{% endif %}>
    <textarea id="note" class="note-input" placeholder="写点笔记…（支持 Markdown）">{{ note }}</textarea>
    <div class="note-bar">
      <button id="note-save" type="button" class="btn">保存笔记</button>
      <button id="note-draft" type="button" class="btn-link">✨ AI 起草</button>
      <span id="note-status" class="note-status"></span>
    </div>
  </div>
</section>
<script>
(function () {
  const view = document.getElementById("note-view");
  const edit = document.getElementById("note-edit");
  const editBtn = document.getElementById("note-edit-btn");
  const ta = document.getElementById("note");
  const saveBtn = document.getElementById("note-save");
  const status = document.getElementById("note-status");

  let viewTimer = null;
  function showEdit() {
    if (viewTimer) { clearTimeout(viewTimer); viewTimer = null; }  // cancel a pending swap-to-view
    status.className = "note-status"; status.textContent = "";     // drop any stale "已保存 ✓"
    view.hidden = true; editBtn.hidden = true; edit.hidden = false; ta.focus();
  }
  function showView() { edit.hidden = true; view.hidden = false; editBtn.hidden = false; }

  editBtn.addEventListener("click", showEdit);

  saveBtn.addEventListener("click", async () => {
    saveBtn.disabled = true;
    status.className = "note-status";
    status.textContent = "保存中…";
    try {
      const r = await fetch("/notes/{{ item.id }}", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: ta.value }),
      });
      if (!r.ok) throw new Error("HTTP " + r.status);
      const data = await r.json();
      status.textContent = "已保存 ✓";
      if (ta.value.trim()) {
        view.innerHTML = data.html;
        viewTimer = setTimeout(showView, 700);   // let "已保存 ✓" show briefly before switching to the rendered view
      }
    } catch (e) {
      status.className = "note-status err";
      status.textContent = "保存失败：" + e;
    } finally {
      saveBtn.disabled = false;
    }
  });
  const draftBtn = document.getElementById("note-draft");
  let drafting = false;
  draftBtn.addEventListener("click", async () => {
    if (drafting) return;
    drafting = true; draftBtn.disabled = true;
    status.className = "note-status"; status.textContent = "正在起草…";
    const base = ta.value.trim() ? ta.value.replace(/\s+$/, "") + "\n\n" : "";
    let resp;
    try {
      resp = await fetch("/notes/{{ item.id }}/draft", { method: "POST" });
    } catch (e) {
      status.className = "note-status err"; status.textContent = "起草失败：" + e;
      drafting = false; draftBtn.disabled = false; return;
    }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "", acc = "";
    try {
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const lines = buf.split("\n"); buf = lines.pop();
        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          let p; try { p = JSON.parse(line.slice(6)); } catch (e) { continue; }
          if (p.delta) { acc += p.delta; ta.value = base + acc; }
          else if (p.error) { status.className = "note-status err"; status.textContent = "⚠️ " + p.error; }
        }
      }
      if (acc && status.textContent === "正在起草…") { status.textContent = "草稿已生成，编辑后保存"; }
    } finally {
      drafting = false; draftBtn.disabled = false;
    }
  });
})();
</script>
