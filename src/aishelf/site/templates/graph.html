{% extends "base.html" %}
{% block title %}图谱 · Atlas{% endblock %}
{% block content %}
<div class="globe-wrap">
  <div class="globe-bar">
    <span class="globe-title">知识星球</span>
    <span class="globe-hint">语义相近的内容聚在一起 · 拖拽旋转 · 滚轮缩放 · 点击进入详情</span>
    <span class="globe-spacer"></span>
    <input id="globeSearch" class="globe-search" placeholder="高亮节点…" />
    <div class="globe-filters" id="globeFilters">
      <button type="button" data-f="all" class="on">全部</button>
      <button type="button" data-f="video">视频</button>
      <button type="button" data-f="blog">博客</button>
    </div>
    <div class="globe-legend" id="globeLegend"></div>
  </div>
  <div id="globe" class="globe-canvas"></div>
  <div class="verb-pill" id="verbPill">
    <button type="button" data-mode="replay">▶ 回放</button>
    <button type="button" data-mode="tour">🛸 逛逛</button>
    <button type="button" data-mode="path">🔗 路径</button>
  </div>
  <div class="replay-bar" id="replayBar">
    <span class="play" id="replayPlay">⏸</span>
    <input type="range" id="replayRange" min="0" max="1000" value="1000" />
    <span class="date" id="replayDate"></span>
  </div>
  <div class="tour-cap" id="tourCap"></div>
  <div class="path-panel" id="pathPanel">
    <div class="path-hint" id="pathHint">点两颗星，看它们怎么连起来</div>
    <div class="path-text" id="pathText"></div>
  </div>
  <div id="globeTip" class="globe-tip" hidden></div>
  <div id="globeEmpty" class="globe-empty" hidden>
    图谱暂时没有数据。先在 <a href="/collect">Hermes</a> 采集内容，配置好 embedding 服务后运行一次
    <code>python -m aishelf.db sync --rebuild</code>。
  </div>
</div>
<style>
  main:has(.globe-wrap) { max-width: none; padding: 0; }
  .globe-wrap { position: relative; display: flex; flex-direction: column; height: calc(100vh - 57px); height: calc(100dvh - 57px); background: #05070f; }
  .globe-bar { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid #16203a; background: #0a0f1e; color: #cdd8ef; flex: none; z-index: 2; }
  .globe-title { font-weight: 700; color: #eaf2ff; }
  .globe-hint { font-size: 12px; color: #5f6f93; }
  .globe-spacer { margin-left: auto; }
  .globe-search { height: 32px; border: 1px solid #1d2a48; border-radius: 8px; padding: 0 10px; font-size: 13px; outline: none; background: #0c1426; color: #dce6fb; }
  .globe-search:focus { border-color: #2f6fe0; }
  .globe-filters button { height: 30px; padding: 0 12px; margin-left: 6px; border: 1px solid #1d2a48; background: #0c1426; color: #93a3c8; border-radius: 999px; cursor: pointer; font-size: 13px; }
  .globe-filters button.on { background: #2f6fe0; border-color: #2f6fe0; color: #fff; }
  .globe-canvas { flex: 1; min-height: 0; position: relative; background: radial-gradient(1200px 800px at 50% 30%, #0c1730, #05070f 70%); cursor: grab; }
  .node-label { color: #bcd4ff; font-size: 11px; font-family: -apple-system, "PingFang SC", sans-serif; text-shadow: 0 0 6px rgba(20,80,180,.9); pointer-events: none; white-space: nowrap; }
  .globe-tip { position: absolute; z-index: 3; max-width: 320px; background: rgba(8,14,28,.94); color: #e7eefb; border: 1px solid #24365f; border-radius: 8px; padding: 6px 10px; font-size: 12px; line-height: 1.5; pointer-events: none; }
  .globe-empty { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); max-width: 460px; text-align: center; color: #8aa0cc; font-size: 14px; line-height: 1.7; }
  .globe-empty code { background: #111c33; padding: 2px 6px; border-radius: 6px; }
  .galaxy-label { color: #eaf2ff; font-size: 14px; font-weight: 700; opacity: .55;
                  text-shadow: 0 0 10px rgba(40,120,220,.8); pointer-events: none; white-space: nowrap; }
  .globe-legend { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .globe-legend button { display: inline-flex; align-items: center; gap: 5px; height: 28px;
                         padding: 0 10px; border: 1px solid #1d2a48; background: #0c1426;
                         color: #aebbd9; border-radius: 999px; cursor: pointer; font-size: 12px; }
  .globe-legend button.off { opacity: .4; }
  .globe-legend .sw { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .verb-pill { position: absolute; left: 50%; bottom: 16px; transform: translateX(-50%);
               display: flex; gap: 6px; background: rgba(10,15,30,.85); border: 1px solid #24365f;
               border-radius: 999px; padding: 5px 7px; z-index: 3; }
  .verb-pill button { border: none; background: transparent; color: #bcd4ff; font-size: 13px;
                      padding: 4px 12px; border-radius: 999px; cursor: pointer; opacity: .85; }
  .verb-pill button:disabled { cursor: not-allowed; opacity: .4; }
  .verb-pill button.on { background: #16263f; color: #fff; opacity: 1; }
  .replay-bar { position: absolute; left: 50%; bottom: 64px; transform: translateX(-50%);
    display: none; align-items: center; gap: 10px; background: rgba(10,15,30,.9);
    border: 1px solid #24365f; border-radius: 999px; padding: 6px 14px; z-index: 3;
    color: #cdd8ef; font-size: 12px; }
  .replay-bar.show { display: flex; }
  .replay-bar input[type=range] { width: 220px; }
  .replay-bar .play { cursor: pointer; width: 26px; text-align: center; user-select: none; }
  .replay-bar .date { min-width: 88px; font-variant-numeric: tabular-nums; }
  .tour-cap { position: absolute; left: 50%; bottom: 64px; transform: translateX(-50%);
    display: none; max-width: 60%; text-align: center; background: rgba(10,15,30,.9);
    border: 1px solid #24365f; border-radius: 12px; padding: 10px 16px; z-index: 3;
    color: #e7eefb; font-size: 14px; line-height: 1.6; }
  .tour-cap.show { display: block; }
  .tour-cap b { color: #9fc6ff; }
  .path-panel { position: absolute; right: 16px; top: 68px; width: 300px; max-height: 60%;
    display: none; flex-direction: column; gap: 8px; background: rgba(8,14,28,.94);
    border: 1px solid #24365f; border-radius: 12px; padding: 12px 14px; z-index: 3;
    color: #e7eefb; font-size: 13px; line-height: 1.7; overflow: auto; }
  .path-panel.show { display: flex; }
  .path-hint { color: #9fb0d4; font-size: 12px; }
  .path-text { white-space: pre-wrap; }
</style>
<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>
<script>
(async function () {
  let data;
  try { data = await (await fetch('/api/graph')).json(); }
  catch (e) { data = { nodes: [], edges: [] }; }
  if (!data.nodes || !data.nodes.length) { document.getElementById('globeEmpty').hidden = false; return; }

  const container = document.getElementById('globe');
  const tip = document.getElementById('globeTip');
  const W = () => container.clientWidth, H = () => container.clientHeight;
  const R = 100;
  const COLOR = { video: 0xff9a3c, blog: 0x4cc2ff };
  const CLUSTER_COLOR = {};
  for (const c of (data.clusters || [])) {
    if (c.color) CLUSTER_COLOR[c.id] = parseInt(c.color.replace('#', '0x'));
  }
  const nodeColor = (n) =>
    (n.cluster != null && CLUSTER_COLOR[n.cluster] != null) ? CLUSTER_COLOR[n.cluster]
      : (COLOR[n.type] || 0x9aa6bb);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, W() / H(), 1, 5000);
  camera.position.set(0, 0, R * 3.2);

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio || 1);
  renderer.setSize(W(), H());
  container.appendChild(renderer.domElement);

  const labelRenderer = new THREE.CSS2DRenderer();
  labelRenderer.setSize(W(), H());
  labelRenderer.domElement.style.position = 'absolute';
  labelRenderer.domElement.style.top = '0';
  labelRenderer.domElement.style.left = '0';
  labelRenderer.domElement.style.pointerEvents = 'none';
  container.appendChild(labelRenderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.6;
  controls.enablePan = false;
  controls.minDistance = R * 1.3;
  controls.maxDistance = R * 8;

  scene.add(new THREE.AmbientLight(0x88aaff, 0.9));
  const pl = new THREE.PointLight(0x66ccff, 1.1); pl.position.set(R * 2, R * 2, R * 3); scene.add(pl);

  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(R, 36, 24),
    new THREE.MeshBasicMaterial({ color: 0x16e0ff, wireframe: true, transparent: true, opacity: 0.13 })));
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(R * 0.985, 36, 24),
    new THREE.MeshBasicMaterial({ color: 0x0a1c38, transparent: true, opacity: 0.45 })));

  // Nodes are flat glowing dots (billboarded sprites), not shaded 3D balls.
  const DOT = (function () {
    const c = document.createElement('canvas'); c.width = c.height = 64;
    const g = c.getContext('2d');
    const grd = g.createRadialGradient(32, 32, 0, 32, 32, 32);
    grd.addColorStop(0, 'rgba(255,255,255,1)');
    grd.addColorStop(0.35, 'rgba(255,255,255,0.9)');
    grd.addColorStop(1, 'rgba(255,255,255,0)');
    g.fillStyle = grd; g.beginPath(); g.arc(32, 32, 32, 0, Math.PI * 2); g.fill();
    return new THREE.CanvasTexture(c);
  })();
  const nodeMeshes = [];
  for (const n of data.nodes) {
    n.href = (n.type === 'video' ? '/videos/' : '/blogs/') + encodeURIComponent(n.id);
    const size = 3 + 1.0 * Math.min(n.degree || 0, 8);   // dot diameter (world units)
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
      map: DOT, color: nodeColor(n), transparent: true, opacity: 1, depthWrite: false,
    }));
    sprite.scale.set(size, size, 1);
    sprite.position.set(n.x * R, n.y * R, n.z * R);
    sprite.userData = n;
    if (n.type === 'blog') {
      const ring = new THREE.Sprite(new THREE.SpriteMaterial({
        map: DOT, color: 0xffffff, transparent: true, opacity: 0.25, depthWrite: false,
      }));
      ring.scale.set(size * 1.7, size * 1.7, 1);
      ring.position.copy(sprite.position);
      scene.add(ring);
    }
    scene.add(sprite); nodeMeshes.push(sprite);

    // Label in world space (nodes are static; avoids sprite-scale offset issues).
    const div = document.createElement('div');
    div.className = 'node-label';
    div.textContent = n.alias || (n.title.length > 10 ? n.title.slice(0, 10) + '…' : n.title);
    const label = new THREE.CSS2DObject(div);
    label.position.set(n.x * R, n.y * R + size * 0.5 + 2.5, n.z * R);
    scene.add(label);
    n._label = label;
  }

  // Floating galaxy-name labels at each cluster's centroid.
  const galaxyAcc = {};   // cluster id -> {sx, sy, sz, n}
  for (const n of data.nodes) {
    if (n.cluster == null) continue;
    const g = galaxyAcc[n.cluster] || (galaxyAcc[n.cluster] = { sx: 0, sy: 0, sz: 0, n: 0 });
    g.sx += n.x; g.sy += n.y; g.sz += n.z; g.n++;
  }
  const clusterName = {};
  for (const c of (data.clusters || [])) clusterName[c.id] = c.name || '';
  for (const [cid, g] of Object.entries(galaxyAcc)) {
    const name = clusterName[cid] || ('星系 ' + cid);
    const cx = g.sx / g.n, cy = g.sy / g.n, cz = g.sz / g.n;
    const div = document.createElement('div');
    div.className = 'galaxy-label';
    div.textContent = name;
    const label = new THREE.CSS2DObject(div);
    label.position.set(cx * R * 1.08, cy * R * 1.08, cz * R * 1.08);
    scene.add(label);
  }

  const ray = new THREE.Raycaster(), mouse = new THREE.Vector2();
  let hovered = null;
  renderer.domElement.addEventListener('mousemove', (ev) => {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((ev.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((ev.clientY - rect.top) / rect.height) * 2 + 1;
    ray.setFromCamera(mouse, camera);
    const nodeHit = ray.intersectObjects(nodeMeshes.filter((m) => m.visible))[0];
    if (nodeHit) {                               // node: show its full title
      hovered = nodeHit.object;
      tip.hidden = false;
      tip.textContent = hovered.userData.title;
      tip.style.left = (ev.clientX - rect.left + 14) + 'px';
      tip.style.top = (ev.clientY - rect.top + 14) + 'px';
      renderer.domElement.style.cursor = 'pointer';
      controls.autoRotate = false;
    } else {
      hovered = null;
      tip.hidden = true;
      renderer.domElement.style.cursor = 'grab';
      if (!currentMode) controls.autoRotate = true;   // a mode owns autoRotate while active
    }
  });
  renderer.domElement.addEventListener('click', () => {
    if (currentMode === 'path') return;   // path mode owns clicks (star picking)
    if (hovered && hovered.userData.href) window.open(hovered.userData.href, '_blank', 'noopener');
  });

  let legendActive = null;   // shared so the type filter can clear legend isolation
  document.getElementById('globeFilters').addEventListener('click', (e) => {
    const b = e.target.closest('button'); if (!b) return;
    document.getElementById('globeSearch').value = '';
    document.querySelectorAll('#globeFilters button').forEach((x) => x.classList.toggle('on', x === b));
    legendActive = null;
    document.querySelectorAll('#globeLegend button').forEach((x) => x.classList.remove('off'));
    const f = b.dataset.f;
    for (const m of nodeMeshes) {
      const vis = (f === 'all' || m.userData.type === f);
      m.visible = vis;
      m.material.opacity = 1;
      if (m.userData._label) {
        m.userData._label.visible = vis;
        m.userData._label.element.style.opacity = '1';
      }
    }
  });

  (function buildLegend() {
    const box = document.getElementById('globeLegend');
    for (const c of (data.clusters || [])) {
      const b = document.createElement('button');
      b.innerHTML = '<span class="sw" style="background:' + (c.color || '#888') + '"></span>'
        + (c.name || ('星系 ' + c.id));
      b.addEventListener('click', () => {
        legendActive = (legendActive === c.id) ? null : c.id;
        document.querySelectorAll('#globeLegend button').forEach((x) => x.classList.remove('off'));
        for (const m of nodeMeshes) {
          const vis = (legendActive == null) || (m.userData.cluster === legendActive);
          m.material.opacity = vis ? 1 : 0.08;
          if (m.userData._label) m.userData._label.element.style.opacity = vis ? '1' : '0.08';
        }
        if (legendActive != null) {
          document.querySelectorAll('#globeLegend button').forEach((x, i) => {
            if ((data.clusters[i] || {}).id !== legendActive) x.classList.add('off');
          });
        }
      });
      box.appendChild(b);
    }
  })();

  document.getElementById('globeSearch').addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    for (const m of nodeMeshes) {
      const n = m.userData;
      const match = !q || ((n.alias || '') + ' ' + (n.title || '')).toLowerCase().includes(q);
      m.material.opacity = match ? 1 : 0.12;
      if (n._label) n._label.element.style.opacity = match ? '1' : '0.12';
    }
  });

  // ---- shared world positions + adjacency (used by tour / path) ----
  const posOf = {};
  for (const n of data.nodes) posOf[n.id] = new THREE.Vector3(n.x * R, n.y * R, n.z * R);
  const adj = {};
  for (const e of (data.edges || [])) {
    (adj[e.source] || (adj[e.source] = [])).push({ id: e.target, w: e.weight });
    (adj[e.target] || (adj[e.target] = [])).push({ id: e.source, w: e.weight });
  }
  const meshOf = {};
  for (const m of nodeMeshes) meshOf[m.userData.id] = m;

  // ---- mode manager: at most one active verb; leaving restores the rest state ----
  let frameHook = null, exitMode = null, currentMode = null;
  const MODES = {};
  function restoreAll() {
    for (const m of nodeMeshes) {
      m.visible = true; m.material.opacity = 1;
      if (m.userData._label) { m.userData._label.visible = true; m.userData._label.element.style.opacity = '1'; }
    }
  }
  function leaveMode() {
    if (exitMode) { try { exitMode(); } catch (e) {} }
    exitMode = null; frameHook = null; currentMode = null;
    document.querySelectorAll('#verbPill button').forEach((b) => b.classList.remove('on'));
    restoreAll();
    // reset the resting filters so the chrome agrees with the now-full graph
    document.querySelectorAll('#globeFilters button').forEach((x) => x.classList.toggle('on', x.dataset.f === 'all'));
    document.querySelectorAll('#globeLegend button').forEach((x) => x.classList.remove('off'));
    legendActive = null;
    document.getElementById('globeSearch').value = '';
    controls.autoRotate = true;
  }
  function setMode(name) {
    if (currentMode === name) { leaveMode(); return; }   // toggle off
    leaveMode();
    currentMode = name;
    document.querySelectorAll('#verbPill button').forEach((b) => b.classList.toggle('on', b.dataset.mode === name));
    controls.autoRotate = false;
    exitMode = MODES[name] ? (MODES[name]() || null) : null;
  }
  document.getElementById('verbPill').addEventListener('click', (e) => {
    const b = e.target.closest('button'); if (!b || b.disabled) return;
    if (b.dataset.mode) setMode(b.dataset.mode);
  });

  // ---- B 时间回放 ----
  MODES.replay = function () {
    const bar = document.getElementById('replayBar');
    const range = document.getElementById('replayRange');
    const playBtn = document.getElementById('replayPlay');
    const dateEl = document.getElementById('replayDate');
    const times = data.nodes.map((n) => Date.parse(n.collected_at) || 0);
    const tmin = Math.min(...times), tmax = Math.max(...times) || (tmin + 1);
    const span = (tmax - tmin) || 1;
    const DURATION = 18000;          // ms for a full sweep
    let p = 0, playing = true, last = performance.now();

    function applyAt(pp) {
      const cutoff = tmin + pp * span;
      for (const m of nodeMeshes) {
        const t = Date.parse(m.userData.collected_at) || 0;
        const born = t <= cutoff;
        const fade = born ? Math.min(1, (cutoff - t) / (span * 0.04 + 1)) : 0;
        m.visible = born;
        m.material.opacity = born ? Math.max(0.2, fade) : 0;
        if (m.userData._label) {
          m.userData._label.visible = born;
          m.userData._label.element.style.opacity = born ? String(Math.max(0.2, fade)) : '0';
        }
      }
      dateEl.textContent = new Date(cutoff).toISOString().slice(0, 10);
      range.value = String(Math.round(pp * 1000));
    }

    bar.classList.add('show');
    frameHook = function () {
      if (playing) {
        const now = performance.now();
        p += (now - last) / DURATION; last = now;
        if (p >= 1) { p = 1; playing = false; playBtn.textContent = '▶'; }
        applyAt(p);
      } else { last = performance.now(); }
    };
    playBtn.onclick = function () {
      if (p >= 1) p = 0;             // restart from the beginning
      playing = !playing; playBtn.textContent = playing ? '⏸' : '▶';
      last = performance.now();
    };
    range.oninput = function () {
      playing = false; playBtn.textContent = '▶';
      p = Number(range.value) / 1000; applyAt(p);
    };
    applyAt(0);
    return function exit() {
      bar.classList.remove('show');
      playBtn.onclick = null; range.oninput = null;
    };
  };

  // ---- D 语义漫游 ----
  MODES.tour = function () {
    const cap = document.getElementById('tourCap');
    const ids = data.nodes.map((n) => n.id);
    const visited = new Set();
    const HOLD = 3000;            // ms dwell per node
    let cur = ids[Math.floor(Math.random() * ids.length)] || null;
    let hold = HOLD, last = performance.now(), lastCluster = null;
    const target = new THREE.Vector3();
    cap.classList.add('show');

    function clusterName(cid) {
      const c = (data.clusters || []).find((x) => x.id === cid);
      return c ? c.name : '';
    }
    function go(id) {
      if (!id || !meshOf[id]) return;
      visited.add(id); cur = id;
      const n = meshOf[id].userData;
      let html = '';
      const cn = clusterName(n.cluster);
      if (cn && n.cluster !== lastCluster) { html += '进入「<b>' + cn + '</b>」　'; lastCluster = n.cluster; }
      html += '<b>' + (n.alias || n.title) + '</b>';
      if (n.hook) html += '<br>' + n.hook;
      cap.innerHTML = html;
      const keep = new Set([id, ...((adj[id] || []).map((e) => e.id))]);
      for (const m of nodeMeshes) {
        const on = keep.has(m.userData.id);
        m.material.opacity = on ? 1 : 0.12;
        if (m.userData._label) m.userData._label.element.style.opacity = on ? '1' : '0.12';
      }
    }
    function next() {
      const nbrs = (adj[cur] || []).map((e) => e.id);
      const fresh = nbrs.filter((i) => !visited.has(i));
      const pool = fresh.length ? fresh : nbrs;
      if (pool.length) return pool[Math.floor(Math.random() * pool.length)];
      const rest = ids.filter((i) => !visited.has(i));   // dead end -> jump
      return (rest.length ? rest : ids)[Math.floor(Math.random() * (rest.length ? rest.length : ids.length))];
    }

    go(cur);
    frameHook = function () {
      const now = performance.now(); const dt = now - last; last = now;
      const p = posOf[cur];
      if (p) {
        controls.target.lerp(p, 0.05);
        target.copy(p).normalize().multiplyScalar(R * 2.3);
        camera.position.lerp(target, 0.03);
      }
      hold -= dt;
      if (hold <= 0) { hold = HOLD; go(next()); }
    };
    return function exit() { cap.classList.remove('show'); controls.target.set(0, 0, 0); };
  };

  // ---- E 语义路径 ----
  MODES.path = function () {
    const panel = document.getElementById('pathPanel');
    const hint = document.getElementById('pathHint');
    const text = document.getElementById('pathText');
    panel.classList.add('show'); hint.textContent = '点第一颗星'; text.textContent = '';
    let a = null, lineObj = null;

    function dijkstra(src, dst) {
      const dist = { [src]: 0 }, prev = {}, seen = new Set();
      const pq = [[0, src]];
      while (pq.length) {
        pq.sort((x, y) => x[0] - y[0]);
        const [d, u] = pq.shift();
        if (u === dst) break;
        if (seen.has(u)) continue; seen.add(u);
        for (const e of (adj[u] || [])) {
          const nd = d + (1 - e.w);          // stronger edge (higher w) = shorter
          if (dist[e.id] == null || nd < dist[e.id]) { dist[e.id] = nd; prev[e.id] = u; pq.push([nd, e.id]); }
        }
      }
      if (dst !== src && prev[dst] == null) return null;
      const route = [dst]; let c = dst;
      while (c !== src) { c = prev[c]; if (c == null) return null; route.unshift(c); }
      return route;
    }
    function clearLine() {
      if (lineObj) { scene.remove(lineObj); lineObj.geometry.dispose(); lineObj.material.dispose(); lineObj = null; }
    }
    function drawRoute(route) {
      clearLine();
      const pts = route.map((id) => posOf[id]).filter(Boolean);
      lineObj = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),
        new THREE.LineBasicMaterial({ color: 0x6cf0ff, transparent: true, opacity: 0.9 }));
      scene.add(lineObj);
      const keep = new Set(route);
      for (const m of nodeMeshes) {
        const on = keep.has(m.userData.id);
        m.material.opacity = on ? 1 : 0.08;
        if (m.userData._label) m.userData._label.element.style.opacity = on ? '1' : '0.08';
      }
    }
    async function explain(route) {
      try {
        const resp = await fetch('/graph/path', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ids: route }),
        });
        const reader = resp.body.getReader(), dec = new TextDecoder();
        let buf = ''; text.textContent = '';
        while (true) {
          const { done, value } = await reader.read(); if (done) break;
          buf += dec.decode(value, { stream: true });
          const lines = buf.split('\n'); buf = lines.pop();
          for (const ln of lines) {
            if (!ln.startsWith('data: ')) continue;
            const ev = JSON.parse(ln.slice(6));
            if (ev.delta) text.textContent += ev.delta;
            if (ev.error) text.textContent = ev.error;
          }
        }
      } catch (e) { text.textContent = '解说服务暂时不可用'; }
    }
    // Nearest visible node within a screen-space tolerance — far more forgiving
    // than exact sprite raycasting (the dots are tiny), so a click "near" a star
    // selects it. Front-most wins on ties (smaller projected depth).
    function pickNear(ev) {
      const rect = renderer.domElement.getBoundingClientRect();
      const px = ev.clientX - rect.left, py = ev.clientY - rect.top;
      const v = new THREE.Vector3();
      let best = null, bestScore = Infinity;
      for (const m of nodeMeshes) {
        if (m.material.opacity <= 0.5) continue;        // skip dimmed (e.g. after a route)
        v.copy(m.position).project(camera);
        if (v.z > 1) continue;                          // behind the camera
        const sx = (v.x * 0.5 + 0.5) * rect.width, sy = (-v.y * 0.5 + 0.5) * rect.height;
        const d = Math.hypot(sx - px, sy - py);
        if (d > 26) continue;                           // 26px hit radius
        const score = d + (v.z + 1) * 4;                // tie-break: prefer the front-most
        if (score < bestScore) { bestScore = score; best = m; }
      }
      return best ? best.userData.id : null;
    }
    function onPick(ev) {
      const id = pickNear(ev);
      if (!id) return;
      if (a == null) { a = id; hint.textContent = '已选起点，再点一颗终点星'; return; }
      if (id === a) return;
      const route = dijkstra(a, id);
      if (!route) { hint.textContent = '这两颗星之间暂无语义通路，换一对试试'; a = null; return; }
      hint.textContent = '路径：' + route.length + ' 颗星 · 解说中…';
      drawRoute(route); explain(route); a = null;
    }
    renderer.domElement.addEventListener('click', onPick);
    return function exit() {
      panel.classList.remove('show'); clearLine();
      renderer.domElement.removeEventListener('click', onPick);
    };
  };

  function resize() {
    camera.aspect = W() / H(); camera.updateProjectionMatrix();
    renderer.setSize(W(), H()); labelRenderer.setSize(W(), H());
  }
  window.addEventListener('resize', resize);

  (function animate() {
    requestAnimationFrame(animate);
    if (frameHook) frameHook();
    controls.update();
    renderer.render(scene, camera);
    labelRenderer.render(scene, camera);
  })();
})();
</script>
